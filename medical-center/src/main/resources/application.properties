spring.application.name=medical-center
server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/medical_center}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.mvc.format.date=iso
spring.mvc.format.time=iso
spring.mvc.format.date-time=iso

# JWT - prod-da MUTLEQ JWT_SECRET env-i teyin edin
app.jwt.secret=${JWT_SECRET:ZGV2LXNlY3JldC1mb3ItbWVkaWNhbC1jZW50ZXItYXQtbGVhc3QtMzItYnl0ZXMtbG9uZw==}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS - prod-da CORS_ORIGINS env-i Vercel URL ile teyin edin
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173}

# Default admin (DataInitializer seed)
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:admin123}
app.admin.email=${ADMIN_EMAIL:admin@medical.az}
